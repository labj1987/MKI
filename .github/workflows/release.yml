name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build AppImage
        run: sudo -E env "PATH=$PATH" bash build-appimage.sh

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: mainline-kernel-installer-*-x86_64.AppImage
          generate_release_notes: true
